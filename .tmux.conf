set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename-format "#{pane_current_command}#{?pane_dead,[dead],}"
setw -g aggressive-resize on
set -g renumber-windows on

set -g history-limit 50000
set -g set-clipboard on
set -g mouse on

bind-key c new-window -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key _ split-window -v -c "#{pane_current_path}"
bind-key -r Tab select-pane -t :.+
bind-key r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

source-file ~/.config/tmux/theme.conf

set-hook -g pane-mode-changed "source-file ~/.config/tmux/status.conf"
set-hook -g after-select-window "source-file ~/.config/tmux/status.conf"
set-hook -g after-select-pane "source-file ~/.config/tmux/status.conf"

set-hook -g client-attached "source-file ~/.config/tmux/theme.conf"
set-hook -g client-session-changed "source-file ~/.config/tmux/theme.conf"

set -g status-left ""
set -g status-right "#[fg=#{@fg},bg=#{@bg}]\ue0b2#[bg=#{@fg},fg=#{@bg}]%H:%M"
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#{@bg},bg=#{@bg}]\ue0b0#[fg=#{@fg},bg=#{@bg}]#I\ue0b1#{=8:window_name}#[fg=#{@bg},bg=#{@bg}]\ue0b0"
setw -g window-status-current-format "#[fg=#{@bg},bg=#{@fg}]\ue0b0#[fg=#{@bg},bg=#{@fg},bold]#I\ue0b1#{=12:window_name}#[fg=#{@fg},bg=#{@bg},nobold]\ue0b0"
